<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblio Finder | Entrar</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --preto:#050505; --dourado:#d4af37; --card-bg:#111; --radius:50px; --borda:rgba(212,175,55,0.3); --input-bg:#1a1a1a; }
        *,*::before,*::after{box-sizing:border-box;}
        body { background:var(--preto); color:white; font-family:'Quicksand',sans-serif; margin:0; min-height:100vh; display:flex; flex-direction:column; }
        .main-header { text-align:center; padding:2.5rem 1rem 2rem; background:radial-gradient(circle at top,#1a1a1a,#050505); border-bottom:1px solid var(--borda); border-radius:0 0 60px 60px; }
        .brand-name { font-family:'Playfair Display',serif; font-size:clamp(1.4rem,5vw,2rem); letter-spacing:3px; margin:8px 0 4px; }
        .gold-text { color:var(--dourado); text-shadow:0 0 15px rgba(212,175,55,0.5); }
        .page-subtitle { font-family:'Playfair Display',serif; font-style:italic; color:#bbb; font-size:clamp(0.9rem,3vw,1.1rem); margin:0.3rem 0 0; }
        main { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
        .login-card { background:var(--card-bg); border:1px solid var(--borda); border-radius:24px; padding:2rem; width:100%; max-width:420px; }
        .section-title { font-family:'Playfair Display',serif; color:var(--dourado); font-size:1.1rem; margin:0 0 1.5rem; display:flex; align-items:center; gap:10px; }
        .section-icon { width:28px; height:28px; border-radius:50%; background:rgba(212,175,55,0.1); border:1px solid rgba(212,175,55,0.3); display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
        label { display:block; font-size:0.85rem; color:#aaa; margin-bottom:6px; margin-top:16px; }
        label:first-of-type { margin-top:0; }
        input { width:100%; background:var(--input-bg); border:1px solid var(--borda); border-radius:12px; color:white; font-family:'Quicksand',sans-serif; font-size:0.95rem; padding:12px 16px; outline:none; transition:border-color 0.3s; }
        input:focus { border-color:var(--dourado); }
        .field-error { color:#e07070; font-size:0.78rem; margin-top:5px; display:none; }
        .field-error.vis { display:block; }
        .btn-submit { width:100%; background:var(--dourado); border:none; color:#000; padding:13px; border-radius:var(--radius); cursor:pointer; font-family:'Quicksand',sans-serif; font-weight:700; font-size:0.95rem; margin-top:1.5rem; transition:box-shadow 0.2s; }
        .btn-submit:hover { box-shadow:0 0 18px rgba(212,175,55,0.5); }
        .btn-submit:disabled { opacity:0.6; cursor:not-allowed; }
        .link-line { text-align:center; margin-top:1.2rem; font-size:0.88rem; color:#666; }
        .link-line a { color:var(--dourado); text-decoration:none; font-weight:600; }
        .msg-erro { background:rgba(200,70,70,0.12); border:1px solid rgba(200,70,70,0.3); color:#e07070; border-radius:12px; padding:10px 14px; font-size:0.85rem; margin-top:1rem; display:none; }
        .msg-erro.vis { display:block; }
    </style>
</head>
<body>
<header class="main-header">
    <h1 class="brand-name">BIBLIO <span class="gold-text">FINDER</span></h1>
    <p class="page-subtitle">Bem-vindo de volta</p>
</header>

<main>
    <div class="login-card">
        <h2 class="section-title"><span class="section-icon">✉</span>Entrar na sua conta</h2>

        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
        <span class="field-error" id="email-erro">Insira um e-mail válido.</span>

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password">
        <span class="field-error" id="senha-erro">Informe sua senha.</span>

        <div class="msg-erro" id="msg-erro"></div>

        <button class="btn-submit" id="btn-entrar" onclick="entrar()">Entrar →</button>

        <p class="link-line">Não tem conta? <a href="inscricao.html">Criar conta</a></p>
        <p class="link-line"><a href="index.html">← Voltar para a biblioteca</a></p>
    </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ══ COLE SUAS CONFIGURAÇÕES DO FIREBASE AQUI ══
const firebaseConfig = {
  apiKey: "AIzaSyDaeSPfJRTBfXqznih5p0GCFlGZvxj4CCE",
  authDomain: "biblio-finder-2008.firebaseapp.com",
  projectId: "biblio-finder-2008",
  storageBucket: "biblio-finder-2008.firebasestorage.app",
  messagingSenderId: "358476467223",
  appId: "1:358476467223:web:5f8f021418efb3a8d3e052",
  measurementId: "G-GDW5NXJGQQ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Se já está logado, redireciona
onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'index.html';
});

window.entrar = async function() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const msgErro = document.getElementById('msg-erro');
    const btn = document.getElementById('btn-entrar');
    let ok = true;

    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    document.getElementById('email-erro').classList.toggle('vis', !emailOk);
    if (!emailOk) ok = false;

    const senhaOk = senha.length > 0;
    document.getElementById('senha-erro').classList.toggle('vis', !senhaOk);
    if (!senhaOk) ok = false;

    if (!ok) return;

    btn.disabled = true;
    btn.textContent = 'Entrando...';
    msgErro.classList.remove('vis');

    try {
        const credencial = await signInWithEmailAndPassword(auth, email, senha);
        const uid = credencial.user.uid;

        // Carregar perfil do Firestore e salvar localmente para uso rápido
        const snap = await getDoc(doc(db, 'usuarios', uid));
        if (snap.exists()) {
            localStorage.setItem('bibliofinder_perfil', JSON.stringify({ uid, ...snap.data() }));
        }

        window.location.href = 'index.html';
    } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Entrar →';
        let mensagem = 'Ocorreu um erro. Tente novamente.';
        if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
            mensagem = 'E-mail ou senha incorretos.';
        } else if (err.code === 'auth/too-many-requests') {
            mensagem = 'Muitas tentativas. Aguarde alguns minutos.';
        }
        msgErro.textContent = mensagem;
        msgErro.classList.add('vis');
    }
};

document.addEventListener('keydown', e => { if (e.key === 'Enter') window.entrar(); });
</script>
</body>
</html>
