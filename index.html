<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <title>Biblio Finder | Gold Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --preto:#050505; --dourado:#d4af37; --card-bg:#111111; --radius:50px; --borda:rgba(212,175,55,0.25); }
        *,*::before,*::after{box-sizing:border-box;}
        body{background:var(--preto);color:white;font-family:'Quicksand',sans-serif;margin:0;}

        .main-header{text-align:center;padding:3rem 1rem 2rem;background:radial-gradient(circle at top,#1a1a1a 0%,#050505 100%);border-bottom:1px solid var(--borda);border-radius:0 0 70px 70px;position:relative;}
        .brand-name{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,5vw,2.2rem);letter-spacing:3px;margin:10px 0;}
        .gold-text{color:var(--dourado);text-shadow:0 0 15px rgba(212,175,55,0.5);}
        .alma-quote{font-family:'Playfair Display',serif;font-style:italic;color:#bbb;font-weight:400;font-size:clamp(0.9rem,3vw,1.2rem);margin:0.5rem 1rem 0;}

        .header-actions{position:absolute;top:1.2rem;right:1.2rem;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
        .btn-header{background:transparent;border:1.5px solid var(--borda);color:#aaa;padding:7px 16px;border-radius:var(--radius);font-family:'Quicksand',sans-serif;font-weight:600;font-size:0.8rem;cursor:pointer;text-decoration:none;transition:all 0.2s;}
        .btn-header:hover{border-color:var(--dourado);color:var(--dourado);}
        .btn-header.gold{background:var(--dourado);color:#000;border-color:var(--dourado);}
        .btn-header.gold:hover{box-shadow:0 0 12px rgba(212,175,55,0.4);}
        .user-greeting{color:var(--dourado);font-size:0.8rem;font-weight:600;}

        .search-wrap{max-width:500px;margin:1.5rem auto 0;padding:0 1rem;position:relative;}
        .search-input{width:100%;background:#1a1a1a;border:1.5px solid var(--borda);border-radius:var(--radius);color:white;font-family:'Quicksand',sans-serif;font-size:0.9rem;padding:11px 44px 11px 18px;outline:none;transition:border-color 0.3s;}
        .search-input:focus{border-color:var(--dourado);}

        .genre-nav{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:1.5rem 1rem 0.5rem;}
        .genre-pill{background:transparent;border:1.5px solid var(--dourado);color:var(--dourado);padding:8px 18px;border-radius:var(--radius);cursor:pointer;font-family:'Quicksand',sans-serif;font-weight:600;font-size:0.85rem;transition:background 0.25s,color 0.25s,box-shadow 0.25s;}
        .genre-pill.active,.genre-pill:hover{background:var(--dourado);color:black;box-shadow:0 0 12px var(--dourado);}

        main{max-width:1200px;margin:0 auto;}
        .book-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;padding:20px 16px;}
        @media(min-width:480px){.book-grid{grid-template-columns:repeat(3,1fr);}}
        @media(min-width:768px){.book-grid{grid-template-columns:repeat(4,1fr);gap:20px;padding:24px 20px;}}
        @media(min-width:1100px){.book-grid{grid-template-columns:repeat(5,1fr);}}

        .book-card{background:var(--card-bg);border-radius:20px;padding:12px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.5);transition:transform 0.3s,box-shadow 0.3s;display:flex;flex-direction:column;border:1px solid rgba(212,175,55,0.08);}
        .book-card:hover{transform:translateY(-5px);box-shadow:0 6px 18px rgba(0,0,0,0.7);}
        .cover-wrapper{margin-bottom:10px;position:relative;}
        .cover-wrapper img{width:100%;height:auto;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.5);display:block;aspect-ratio:2/3;object-fit:cover;}
        .cover-placeholder{width:100%;aspect-ratio:2/3;border-radius:12px;background:linear-gradient(135deg,#1a1a1a,#222);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
        .cover-emoji{font-size:2rem;}
        .cover-genre-label{font-size:0.6rem;color:rgba(212,175,55,0.4);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
        .badge-lido{position:absolute;top:6px;right:6px;background:rgba(80,200,80,0.85);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:bold;}
        .book-info{display:flex;flex-direction:column;flex:1;}
        .book-info h3{font-size:clamp(0.8rem,2.5vw,0.95rem);color:var(--dourado);margin:6px 0 3px;line-height:1.3;}
        .book-info .autor{font-size:0.75rem;color:#888;margin:2px 0;}
        .book-info .genero-tag{display:inline-block;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.2);color:rgba(212,175,55,0.6);font-size:0.65rem;padding:2px 8px;border-radius:20px;margin:4px auto;font-weight:600;}
        .book-info .sinopse{font-size:0.75rem;color:#999;line-height:1.5;margin:4px 0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
        .book-info .avaliacao{font-size:0.75rem;color:#c8a800;margin:3px 0;}
        .btn-card{display:inline-block;margin-top:auto;padding:7px 14px;background:var(--dourado);color:black;font-family:'Quicksand',sans-serif;font-weight:700;font-size:0.8rem;border-radius:var(--radius);border:none;cursor:pointer;transition:box-shadow 0.2s;width:100%;margin-top:8px;}
        .btn-card:hover{box-shadow:0 0 10px var(--dourado);}
        .btn-fav{display:block;width:100%;margin-top:6px;padding:6px 14px;background:transparent;border:1.5px solid rgba(212,175,55,0.3);color:#d4af37;font-family:'Quicksand',sans-serif;font-weight:600;font-size:0.75rem;border-radius:var(--radius);cursor:pointer;transition:all 0.2s;}
        .btn-fav:hover,.btn-fav.ativo{background:rgba(212,175,55,0.12);border-color:var(--dourado);}

        .empty-state{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:#555;}
        .empty-state-icon{font-size:3rem;margin-bottom:1rem;}
        .empty-state p{font-size:0.95rem;line-height:1.7;}
        .empty-state a{color:var(--dourado);text-decoration:none;font-weight:600;}

        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity 0.3s;}
        .modal-overlay.aberto{opacity:1;pointer-events:all;}
        .modal-box{background:#111;border:1px solid var(--borda);border-radius:24px;max-width:480px;width:100%;padding:2rem;position:relative;max-height:85vh;overflow-y:auto;transform:scale(0.95);transition:transform 0.3s;}
        .modal-overlay.aberto .modal-box{transform:scale(1);}
        .modal-fechar{position:absolute;top:1rem;right:1rem;background:transparent;border:none;color:#666;font-size:1.1rem;cursor:pointer;transition:color 0.2s;}
        .modal-fechar:hover{color:white;}
        .modal-cover{width:120px;margin:0 auto 1rem;display:block;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.6);aspect-ratio:2/3;object-fit:cover;}
        .modal-cover-placeholder{width:120px;aspect-ratio:2/3;border-radius:12px;background:linear-gradient(135deg,#1a1a1a,#222);display:flex;align-items:center;justify-content:center;font-size:2.5rem;margin:0 auto 1rem;}
        .modal-titulo{font-family:'Playfair Display',serif;color:var(--dourado);font-size:1.3rem;text-align:center;margin:0 0 4px;}
        .modal-autor{text-align:center;color:#888;font-size:0.88rem;margin-bottom:1rem;}
        .modal-sinopse{color:#ccc;font-size:0.9rem;line-height:1.7;margin-bottom:1rem;}
        .modal-info{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:1.2rem;}
        .modal-tag{background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.25);color:rgba(212,175,55,0.8);font-size:0.72rem;padding:3px 10px;border-radius:20px;font-weight:600;}
        .modal-btns{display:flex;flex-direction:column;gap:8px;}

        #bf-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1100;opacity:0;pointer-events:none;transition:opacity 0.3s;}
        #bf-overlay.vis{opacity:1;pointer-events:all;}
        #bf-drawer{position:fixed;top:0;right:-360px;bottom:0;width:min(360px,90vw);background:#0e0e0e;border-left:1px solid var(--borda);z-index:1101;display:flex;flex-direction:column;transition:right 0.35s cubic-bezier(.4,0,.2,1);}
        #bf-drawer.aberto{right:0;}
        .bf-dh{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.4rem;border-bottom:1px solid var(--borda);flex-shrink:0;}
        .bf-dt{font-family:'Playfair Display',serif;color:var(--dourado);font-size:1.1rem;margin:0;}
        #bf-close{background:transparent;border:none;color:#888;font-size:1rem;cursor:pointer;}
        .bf-tabs{display:flex;border-bottom:1px solid var(--borda);flex-shrink:0;}
        .bf-tab{flex:1;background:transparent;border:none;padding:11px;color:#666;font-family:'Quicksand',sans-serif;font-weight:600;font-size:0.83rem;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
        .bf-tab.active{color:var(--dourado);border-bottom-color:var(--dourado);}
        .bf-tc{display:none;flex:1;overflow-y:auto;padding:1rem;}
        .bf-tc.active{display:block;}
        .bf-lista{display:flex;flex-direction:column;gap:10px;}
        .bf-item{display:flex;gap:10px;background:#111;border-radius:12px;padding:10px;border:1px solid rgba(212,175,55,0.1);}
        .bf-item img,.bf-item .bf-img-ph{width:44px;height:66px;border-radius:6px;flex-shrink:0;object-fit:cover;}
        .bf-item .bf-img-ph{background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
        .bf-ii{flex:1;min-width:0;}
        .bf-it{color:var(--dourado);font-size:0.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .bf-ia{color:#777;font-size:0.73rem;margin-top:2px;}
        .bf-id{color:#555;font-size:0.68rem;margin-top:3px;font-style:italic;}
        .bf-ib{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
        .bf-bs{background:transparent;border:1px solid rgba(212,175,55,0.3);color:var(--dourado);font-size:0.7rem;padding:3px 9px;border-radius:20px;cursor:pointer;font-family:'Quicksand',sans-serif;font-weight:600;}
        .bf-bs.rm{border-color:rgba(200,80,80,0.4);color:#e07070;}
        .bf-vazio{text-align:center;color:#555;font-size:0.88rem;padding:2rem 1rem;line-height:1.7;}

        #btn-biblioteca{position:fixed;bottom:24px;right:24px;background:var(--dourado);color:#000;border:none;border-radius:50px;padding:11px 20px;font-size:0.85rem;font-family:'Quicksand',sans-serif;font-weight:700;cursor:pointer;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.5);transition:box-shadow 0.2s;display:flex;align-items:center;gap:7px;}
        #btn-biblioteca:hover{box-shadow:0 0 18px rgba(212,175,55,0.5);}
        .bf-badge{background:#000;color:var(--dourado);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;}
        .bf-badge.hidden{display:none;}

        .loading-msg{grid-column:1/-1;text-align:center;color:var(--dourado);padding:3rem;animation:pulse 1.5s ease-in-out infinite;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    </style>
</head>
<body>
<header class="main-header">
    <div class="header-actions" id="header-actions"></div>
    <h1 class="brand-name">BIBLIO <span class="gold-text">FINDER</span></h1>
    <h2 class="alma-quote">Descubra o livro perfeito para a sua alma.</h2>
    <div class="search-wrap">
        <input type="text" class="search-input" id="busca" placeholder="🔍  Buscar por título ou autor..." autocomplete="off">
    </div>
</header>

<nav class="genre-nav">
    <button class="genre-pill active" data-genre="todos">Todos</button>
    <button class="genre-pill" data-genre="Suspense">Suspense</button>
    <button class="genre-pill" data-genre="Terror">Terror</button>
    <button class="genre-pill" data-genre="Histórico">Histórico</button>
    <button class="genre-pill" data-genre="Ficção Científica">Ficção Científica</button>
    <button class="genre-pill" data-genre="Fantasia">Fantasia</button>
    <button class="genre-pill" data-genre="Romance">Romance</button>
    <button class="genre-pill" data-genre="Aventura">Aventura</button>
    <button class="genre-pill" data-genre="Autoajuda">Autoajuda</button>
</nav>

<main>
    <div class="book-grid" id="book-grid" role="list"></div>
</main>

<div class="modal-overlay" id="modal" role="dialog">
    <div class="modal-box">
        <button class="modal-fechar" id="modal-fechar">✕</button>
        <div id="modal-content"></div>
    </div>
</div>

<div id="bf-overlay"></div>
<aside id="bf-drawer">
    <div class="bf-dh"><h2 class="bf-dt">Minha Biblioteca</h2><button id="bf-close">✕</button></div>
    <div class="bf-tabs">
        <button class="bf-tab active" data-tab="favoritos">❤ Favoritos</button>
        <button class="bf-tab" data-tab="historico">✓ Já lidos</button>
    </div>
    <div class="bf-tc active" id="bf-tab-favoritos"><div class="bf-lista" id="bf-lista-fav"></div></div>
    <div class="bf-tc" id="bf-tab-historico"><div class="bf-lista" id="bf-lista-hist"></div></div>
</aside>

<button id="btn-biblioteca" style="display:none">❤ Biblioteca <span class="bf-badge hidden" id="bf-badge">0</span></button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ══ COLE SUAS CONFIGURAÇÕES DO FIREBASE AQUI ══
const firebaseConfig = {
  apiKey: "AIzaSyDaeSPfJRTBfXqznih5p0GCFlGZvxj4CCE",
  authDomain: "biblio-finder-2008.firebaseapp.com",
  projectId: "biblio-finder-2008",
  storageBucket: "biblio-finder-2008.firebasestorage.app",
  messagingSenderId: "358476467223",
  appId: "1:358476467223:web:5f8f021418efb3a8d3e052",
  measurementId: "G-GDW5NXJGQQ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const GENRE_EMOJI = { Fantasia:'🧙', Romance:'💕', Suspense:'🔍', Terror:'👁️', 'Ficção Científica':'🚀', Histórico:'⚔️', Aventura:'🗺️', Biografia:'📜', Autoajuda:'🌱' };

let perfilAtual = null;
let livrosCache = [];
let generoAtivo = 'todos';
let buscaAtiva = '';

// ── Perfil ──
function getPerfil() { return perfilAtual; }

async function carregarPerfil(uid) {
    const snap = await getDoc(doc(db, 'usuarios', uid));
    if (snap.exists()) {
        perfilAtual = { uid, ...snap.data() };
        localStorage.setItem('bibliofinder_perfil', JSON.stringify(perfilAtual));
    }
    return perfilAtual;
}

async function salvarPerfil(dados) {
    if (!perfilAtual?.uid) return;
    await updateDoc(doc(db, 'usuarios', perfilAtual.uid), dados);
    perfilAtual = { ...perfilAtual, ...dados };
    localStorage.setItem('bibliofinder_perfil', JSON.stringify(perfilAtual));
}

function isFav(id) { return perfilAtual?.favoritos?.some(f => f.id === id) || false; }
function isLido(id) { return perfilAtual?.historico?.some(h => h.id === id) || false; }

async function toggleFav(livro) {
    if (!perfilAtual) return false;
    const favs = perfilAtual.favoritos || [];
    const idx = favs.findIndex(f => f.id === livro.id);
    if (idx >= 0) { favs.splice(idx, 1); }
    else { favs.push(livro); }
    await salvarPerfil({ favoritos: favs });
    atualizarBadge();
    return idx < 0;
}

async function marcarLido(livro) {
    if (!perfilAtual) return;
    const hist = perfilAtual.historico || [];
    if (!hist.some(h => h.id === livro.id)) {
        hist.push({ ...livro, dataLeitura: new Date().toISOString() });
        await salvarPerfil({ historico: hist });
    }
}

// ── Livros via Firestore ──
function getLivros() { return livrosCache; }

// Escuta em tempo real os livros
onSnapshot(collection(db, 'livros'), snap => {
    livrosCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderGrid();
});

// ── Auth ──
onAuthStateChanged(auth, async user => {
    if (user) {
        await carregarPerfil(user.uid);
    } else {
        perfilAtual = null;
        localStorage.removeItem('bibliofinder_perfil');
    }
    renderHeader();
    renderGrid();
    atualizarBadge();
});

// ── Header ──
function renderHeader() {
    const p = getPerfil();
    const ha = document.getElementById('header-actions');
    if (p) {
        ha.innerHTML = `
            <span class="user-greeting">Olá, ${p.nome}!</span>
            ${p.role === 'admin' ? `<a href="admin.html" class="btn-header">⚙ Admin</a>` : ''}
            <button class="btn-header" id="btn-sair">Sair</button>`;
        document.getElementById('btn-sair').addEventListener('click', async () => {
            if (confirm('Sair da conta?')) {
                await signOut(auth);
                localStorage.removeItem('bibliofinder_perfil');
                location.reload();
            }
        });
        document.getElementById('btn-biblioteca').style.display = 'flex';
        document.getElementById('btn-biblioteca').addEventListener('click', abrirPainel);
        atualizarBadge();
    } else {
        ha.innerHTML = `
            <a href="inscricao.html" class="btn-header">Criar conta</a>
            <a href="login.html" class="btn-header gold">Entrar</a>`;
    }
}

// ── Grid ──
function renderGrid() {
    const grid = document.getElementById('book-grid');
    let livros = getLivros();
    if (generoAtivo !== 'todos') livros = livros.filter(l => l.genero === generoAtivo);
    if (buscaAtiva) {
        const q = buscaAtiva.toLowerCase();
        livros = livros.filter(l => l.titulo?.toLowerCase().includes(q) || l.autor?.toLowerCase().includes(q));
    }
    if (livros.length === 0) {
        const p = getPerfil();
        grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📚</div><p>${
            getLivros().length === 0
                ? `Nenhum livro cadastrado ainda.<br>${p?.role==='admin' ? '<a href="admin.html">Ir para o painel admin →</a>' : 'Aguarde o administrador adicionar livros.'}`
                : 'Nenhum livro encontrado para esse filtro.'
        }</p></div>`;
        return;
    }
    const p = getPerfil();
    grid.innerHTML = '';
    livros.forEach(livro => {
        const fav = isFav(livro.id);
        const lido = isLido(livro.id);
        const emoji = GENRE_EMOJI[livro.genero] || '📖';
        const estrelas = '★'.repeat(Math.round(livro.avaliacao||0)) + '☆'.repeat(5-Math.round(livro.avaliacao||0));
        const card = document.createElement('div');
        card.className = 'book-card';
        card.setAttribute('role','listitem');
        card.innerHTML = `
            <div class="cover-wrapper">
                ${livro.capa ? `<img src="${livro.capa}" alt="Capa: ${livro.titulo}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
                <div class="cover-placeholder" style="${livro.capa?'display:none':''}">
                    <span class="cover-emoji">${emoji}</span>
                    <span class="cover-genre-label">${livro.genero}</span>
                </div>
                ${lido ? '<span class="badge-lido" title="Já lido">✓</span>' : ''}
            </div>
            <div class="book-info">
                <h3>${livro.titulo}</h3>
                <p class="autor">${livro.autor}</p>
                <span class="genero-tag">${livro.genero}</span>
                ${livro.avaliacao ? `<p class="avaliacao">${estrelas} ${livro.avaliacao}</p>` : ''}
                <p class="sinopse">${livro.sinopse || ''}</p>
                <button class="btn-card" data-id="${livro.id}">📖 Ver detalhes</button>
                ${p ? `<button class="btn-fav ${fav?'ativo':''}" data-id="${livro.id}">${fav?'❤ Favoritado':'♡ Favoritar'}</button>` : ''}
            </div>`;
        grid.appendChild(card);
    });
    grid.querySelectorAll('.btn-card').forEach(btn => btn.addEventListener('click', () => abrirModal(btn.dataset.id)));
    grid.querySelectorAll('.btn-fav').forEach(btn => btn.addEventListener('click', async () => {
        const livro = getLivros().find(l => l.id === btn.dataset.id);
        if (!livro) return;
        const ad = await toggleFav({id:livro.id, titulo:livro.titulo, autor:livro.autor, capa:livro.capa, genero:livro.genero});
        btn.textContent = ad ? '❤ Favoritado' : '♡ Favoritar';
        btn.classList.toggle('ativo', ad);
    }));
}

// ── Modal ──
function abrirModal(id) {
    const livro = getLivros().find(l => l.id === id);
    if (!livro) return;
    const p = getPerfil();
    const fav = isFav(id);
    const emoji = GENRE_EMOJI[livro.genero] || '📖';
    const estrelas = '★'.repeat(Math.round(livro.avaliacao||0)) + '☆'.repeat(5-Math.round(livro.avaliacao||0));
    document.getElementById('modal-content').innerHTML = `
        ${livro.capa
            ? `<img src="${livro.capa}" class="modal-cover" alt="${livro.titulo}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="modal-cover-placeholder" style="display:none">${emoji}</div>`
            : `<div class="modal-cover-placeholder">${emoji}</div>`}
        <h2 class="modal-titulo">${livro.titulo}</h2>
        <p class="modal-autor">${livro.autor} · ${livro.ano||''}</p>
        <div class="modal-info">
            <span class="modal-tag">${livro.genero}</span>
            ${livro.avaliacao ? `<span class="modal-tag">${estrelas} ${livro.avaliacao}</span>` : ''}
            ${(livro.tags||[]).map(t=>`<span class="modal-tag">${t}</span>`).join('')}
        </div>
        <p class="modal-sinopse">${livro.sinopse || 'Sem sinopse disponível.'}</p>
        <div class="modal-btns">
            ${livro.link ? `<a href="${livro.link}" target="_blank" rel="noopener" class="btn-card" style="text-decoration:none;display:block;text-align:center">🌐 Ler / Comprar</a>` : ''}
            ${p ? `
            <button class="btn-fav ${fav?'ativo':''}" id="modal-fav-btn" data-id="${id}">${fav?'❤ Favoritado':'♡ Favoritar'}</button>
            <button class="btn-fav" id="modal-lido-btn" data-id="${id}" style="border-color:rgba(80,200,80,0.4);color:#70c070">✓ Marcar como lido</button>
            ` : `<a href="inscricao.html" class="btn-fav" style="text-align:center;text-decoration:none">Crie uma conta para favoritar</a>`}
        </div>`;
    document.getElementById('modal').classList.add('aberto');
    document.body.style.overflow = 'hidden';
    if (p) {
        document.getElementById('modal-fav-btn')?.addEventListener('click', async function() {
            const l = getLivros().find(l => l.id === id);
            const ad = await toggleFav({id:l.id, titulo:l.titulo, autor:l.autor, capa:l.capa, genero:l.genero});
            this.textContent = ad ? '❤ Favoritado' : '♡ Favoritar';
            this.classList.toggle('ativo', ad);
            renderGrid();
        });
        document.getElementById('modal-lido-btn')?.addEventListener('click', async function() {
            const l = getLivros().find(l => l.id === id);
            await marcarLido({id:l.id, titulo:l.titulo, autor:l.autor, capa:l.capa, genero:l.genero});
            fecharModal(); renderGrid();
        });
    }
}

function fecharModal() {
    document.getElementById('modal').classList.remove('aberto');
    document.body.style.overflow = '';
}
document.getElementById('modal-fechar').addEventListener('click', fecharModal);
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) fecharModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharModal(); });

// ── Filtros ──
document.querySelectorAll('.genre-pill').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.genre-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        generoAtivo = btn.dataset.genre;
        renderGrid();
    });
});
let buscaTimer;
document.getElementById('busca').addEventListener('input', function() {
    clearTimeout(buscaTimer);
    buscaTimer = setTimeout(() => { buscaAtiva = this.value.trim(); renderGrid(); }, 300);
});

// ── Painel ──
function abrirPainel() { renderPainel(); document.getElementById('bf-drawer').classList.add('aberto'); document.getElementById('bf-overlay').classList.add('vis'); document.body.style.overflow='hidden'; }
function fecharPainel() { document.getElementById('bf-drawer').classList.remove('aberto'); document.getElementById('bf-overlay').classList.remove('vis'); document.body.style.overflow=''; }
document.getElementById('bf-close').addEventListener('click', fecharPainel);
document.getElementById('bf-overlay').addEventListener('click', fecharPainel);
document.querySelectorAll('.bf-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.bf-tab').forEach(t=>t.classList.remove('active'));
        document.querySelectorAll('.bf-tc').forEach(c=>c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`bf-tab-${tab.dataset.tab}`).classList.add('active');
    });
});

function renderPainel() {
    const p = getPerfil();
    renderBfLista('bf-lista-fav', p?.favoritos||[], false);
    renderBfLista('bf-lista-hist', p?.historico||[], true);
}

function renderBfLista(containerId, items, isHist) {
    const c = document.getElementById(containerId);
    if (!items.length) { c.innerHTML = `<div class="bf-vazio">${isHist?'📚 Nenhum livro lido ainda.':'❤ Nenhum favorito salvo ainda.'}</div>`; return; }
    c.innerHTML = items.map(b => {
        const emoji = GENRE_EMOJI[b.genero]||'📖';
        return `<div class="bf-item">
            ${b.capa ? `<img src="${b.capa}" alt="${b.titulo}" loading="lazy">` : `<div class="bf-img-ph">${emoji}</div>`}
            <div class="bf-ii">
                <p class="bf-it">${b.titulo}</p>
                <p class="bf-ia">${b.autor||''}</p>
                ${b.dataLeitura?`<p class="bf-id">Lido em ${new Date(b.dataLeitura).toLocaleDateString('pt-BR')}</p>`:''}
                <div class="bf-ib"><button class="bf-bs rm" data-id="${b.id}" data-tipo="${isHist?'hist':'fav'}">✕ Remover</button></div>
            </div>
        </div>`;
    }).join('');
    c.querySelectorAll('.bf-bs.rm').forEach(btn => btn.addEventListener('click', async () => {
        const p = getPerfil(); if (!p) return;
        if (btn.dataset.tipo === 'fav') p.favoritos = p.favoritos.filter(f=>f.id!==btn.dataset.id);
        else p.historico = p.historico.filter(h=>h.id!==btn.dataset.id);
        await salvarPerfil({ favoritos: p.favoritos, historico: p.historico });
        renderPainel(); atualizarBadge(); renderGrid();
    }));
}

function atualizarBadge() {
    const n = getPerfil()?.favoritos?.length || 0;
    const badge = document.getElementById('bf-badge');
    if (badge) { badge.textContent = n; badge.classList.toggle('hidden', n===0); }
}
</script>
</body>
</html>
