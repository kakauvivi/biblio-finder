<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Biblio Finder | Gold Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-area">
            <img src="logo-gold.png" alt="Biblio Finder" class="logo-esfera">
            <h1 class="brand-name">BIBLIO <span class="gold-text">FINDER</span></h1>
        </div>
        <h2 class="alma-quote">Descubra o livro perfeito para a sua alma.</h2>
    </header>

    <nav class="genre-nav">
        <button class="genre-pill" data-genre="suspense">Suspense</button>
        <button class="genre-pill" data-genre="horror">Terror</button>
        <button class="genre-pill" data-genre="history">Histórico</button>
        <button class="genre-pill" data-genre="science fiction">Ficção Científica</button>
        <button class="genre-pill" data-genre="fantasy">Fantasia</button>
        <button class="genre-pill" data-genre="romance">Romance</button>
    </nav>

    <div class="book-grid" id="book-grid">
        <!-- Livros serão carregados aqui -->
    </div>

    <div id="book-viewer-container" class="hidden">
        <button id="close-viewer">Fechar</button>
        <iframe id="book-viewer" frameborder="0"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
